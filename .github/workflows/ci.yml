name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: CI / Python 3.11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Install packages
        run: |
          pip install -e shared/
          pip install -e phoenix-core/
          pip install -e phoenix-intelligence/

      - name: Verify imports
        run: |
          python -c "from phoenix.cli.main import main; print('phoenix-core OK')"
          python -c "from api.server import app; print('phoenix-intelligence OK')"
        env:
          PYTHONPATH: phoenix-intelligence
