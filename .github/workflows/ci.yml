name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: CI / Python 3.11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Install Playwright system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libx11-6 \
            libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Install packages
        run: |
          pip install pytest
          pip install -e shared/
          pip install -e phoenix-core/
          pip install -e phoenix-intelligence/

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run tests
        run: |
          if [ -d "shared/tests" ]; then
            pytest shared/tests -v --tb=short
          else
            echo "No shared tests directory found"
          fi

          if [ -d "phoenix-core/tests" ]; then
            cd phoenix-core
            pytest tests -v --tb=short
            cd ..
          else
            echo "No phoenix-core tests directory found"
          fi

          if [ -d "phoenix-intelligence/tests" ]; then
            cd phoenix-intelligence
            pytest tests -v --tb=short -m "not integration"
            cd ..
          else
            echo "No phoenix-intelligence tests directory found"
          fi
